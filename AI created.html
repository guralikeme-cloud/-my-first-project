<style>
  /* 基本重置 */
body {
  display: flex; /* 使用 Flexbox 讓選單和內容並排 */
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 側邊欄樣式 */
.sidebar {
  width: 250px;          /* 設定寬度 */
  height: 100vh;         /* 高度撐滿螢幕 */
  background-color: #f1f1f1;
  border-right: 1px solid #ddd;
  overflow-y: auto;      /* 如果選單太長，顯示滾動條 */
}

.sidebar h2 {
  padding: 20px;
  font-size: 1.2rem;
}

.sidebar ul {
  list-style-type: none; /* 去除清單圓點 */
  padding: 0;
  margin: 0;
}

/* 選單按鈕樣式 */
.sidebar li a {
  display: block;
  color: #333;
  padding: 12px 20px;
  text-decoration: none; /* 去除下劃線 */
}

/* 滑鼠經過與選中狀態 */
.sidebar li a:hover {
  background-color: #e0e0e0;
}

.sidebar li a.active {
  background-color: #ffffff;
  font-weight: bold;
}

/* 主要內容區補白 */
.content {
  flex-grow: 1;
  padding: 20px;
}

  /* 子選單按鈕樣式 */
.dropdown-btn {
  padding: 12px 20px;
  text-decoration: none;
  font-size: 16px;
  color: #333;
  display: block;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  outline: none;
}

/* 滑鼠經過按鈕 */
.dropdown-btn:hover {
  background-color: #e0e0e0;
}

/* 子選單容器（預設隱藏） */
.dropdown-container {
  display: none;
  background-color: #f9f9f9;
  padding-left: 20px; /* 讓子項目往右縮排 */
}

/* 當 active 類別被加上去時，顯示子選單 */
.show-menu {
  display: block;
}
</style>
<script>
  // 取得所有的下拉按鈕
var dropdown = document.getElementsByClassName("dropdown-btn");

for (var i = 0; i < dropdown.length; i++) {
  dropdown[i].addEventListener("click", function() {
    // 切換按鈕本身的 active 狀態（可選，用來改顏色）
    this.classList.toggle("active");

    // 取得下一個兄弟元素（即 dropdown-container）
    var dropdownContent = this.nextElementSibling;
    
    // 切換顯示與隱藏
    if (dropdownContent.classList.contains("show-menu")) {
      dropdownContent.classList.remove("show-menu");
    } else {
      dropdownContent.classList.add("show-menu");
    }
  });
}
</script>


<nav class="sidebar">
  <h2>HTML 教程</h2>
  <ul>
    <li><a href="#">HTML 簡介</a></li>
    
    <li class="dropdown">
      <button class="dropdown-btn">HTML 進階內容 ▾</button>
      <ul class="dropdown-container">
        <li><a href="#">HTML 表單</a></li>
        <li><a href="#">HTML 畫布 (Canvas)</a></li>
        <li><a href="#">HTML 媒體</a></li>
      </ul>
    </li>

    <li><a href="#">HTML 屬性</a></li>
  </ul>
</nav>
